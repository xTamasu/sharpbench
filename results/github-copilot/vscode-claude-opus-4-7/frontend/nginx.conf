# nginx.conf
# Serves the built React SPA on port 80 and reverse-proxies /api/ requests
# to the backend container (named "api", listening on 8080) over Docker's
# built-in DNS. SPA fallback to index.html supports client-side routing.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the .NET backend container.
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback: any unknown URL serves index.html so React Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html so deploys propagate immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# Docker Compose configuration for the Task Management System.
# Defines three services: PostgreSQL database, .NET API, and React frontend.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskmanager}
      POSTGRES_USER: ${POSTGRES_USER:-taskuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskpass123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskuser} -d ${POSTGRES_DB:-taskmanager}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-taskmanager};Username=${POSTGRES_USER:-taskuser};Password=${POSTGRES_PASSWORD:-taskpass123}"
      Jwt__Secret: ${JWT_SECRET:-SuperSecretKeyForDevelopmentOnlyChangeInProduction2024!}
      Jwt__Issuer: ${JWT_ISSUER:-TaskManagerApi}
      Jwt__Audience: ${JWT_AUDIENCE:-TaskManagerClient}
      Jwt__ExpiryInMinutes: ${JWT_EXPIRY_MINUTES:-60}
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:

services:
  db:
    image: postgres:16-alpine
    container_name: task-manager-db
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: taskmanager
      POSTGRES_PASSWORD: taskmanager_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-manager-api
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=taskmanager;Username=taskmanager;Password=taskmanager_password_dev;"
      JwtSettings__Secret: "super_secret_jwt_key_that_is_at_least_32_characters_long_for_hs256"
      JwtSettings__Issuer: "TaskManager"
      JwtSettings__Audience: "TaskManagerClient"
      JwtSettings__ExpiryMinutes: "1440"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-manager-frontend
    ports:
      - "8000:80"
    environment:
      VITE_API_BASE_URL: "http://localhost:5001/api"
    depends_on:
      - api

volumes:
  postgres_data:

# Docker Compose configuration for the Task Management System.
# Orchestrates PostgreSQL, .NET API, and React frontend services.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskmanager_pass}
      POSTGRES_DB: ${POSTGRES_DB:-taskmanager}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskmanager}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB:-taskmanager};Username=${POSTGRES_USER:-taskmanager};Password=${POSTGRES_PASSWORD:-taskmanager_pass}
      - Jwt__Secret=${JWT_SECRET:-SuperSecretKeyForJwtTokensAtLeast32Chars!}
      - Jwt__Issuer=${JWT_ISSUER:-TaskManager}
      - Jwt__Audience=${JWT_AUDIENCE:-TaskManagerApp}
      - Jwt__ExpiryMinutes=${JWT_EXPIRY_MINUTES:-60}
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5001:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:

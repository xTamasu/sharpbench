# Docker Compose — Task Management System
# Defines db, api, and frontend services for a single-command startup.

services:
  db:
    image: postgres:16
    container_name: taskmanager-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskmanager_secret}
      POSTGRES_DB: ${POSTGRES_DB:-taskmanager}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskmanager} -d ${POSTGRES_DB:-taskmanager}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-taskmanager};Username=${POSTGRES_USER:-taskmanager};Password=${POSTGRES_PASSWORD:-taskmanager_secret}
      Jwt__Secret: ${JWT_SECRET:-supersecretkey1234567890123456789012}
      Jwt__Issuer: ${JWT_ISSUER:-TaskManagerApi}
      Jwt__Audience: ${JWT_AUDIENCE:-TaskManagerClient}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
    ports:
      - "5001:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:

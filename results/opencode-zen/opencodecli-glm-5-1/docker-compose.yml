# Docker Compose configuration for the Task Management System
# Runs PostgreSQL, .NET API, and React frontend
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskmanager_secret}
      POSTGRES_DB: ${POSTGRES_DB:-taskmanagerdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskmanager} -d ${POSTGRES_DB:-taskmanagerdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB:-taskmanagerdb};Username=${POSTGRES_USER:-taskmanager};Password=${POSTGRES_PASSWORD:-taskmanager_secret}
      - JwtSettings__Secret=${JWT_SECRET:-super_secret_jwt_key_at_least_32_chars_long}
      - JwtSettings__Issuer=${JWT_ISSUER:-TaskManager}
      - JwtSettings__Audience=${JWT_AUDIENCE:-TaskManagerUsers}
      - JwtSettings__ExpiryMinutes=${JWT_EXPIRY_MINUTES:-60}
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: taskmanager_db
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpassword
      POSTGRES_DB: taskmanagerdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskmanagerdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager_api
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=taskmanagerdb;Username=taskuser;Password=taskpassword
      - JwtSettings__Secret=ThisIsAVeryLongAndSecureSecretKeyForJwtAuthentication123!
      - JwtSettings__Issuer=TaskManagerApi
      - JwtSettings__Audience=TaskManagerClients
      - JwtSettings__ExpiryMinutes=60
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager_frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
